<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutinovelas | Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Poppins', sans-serif; color: white; text-align: center;
        }
        .container { max-width: 600px; padding: 40px; }
        h1 { font-size: 48px; margin-bottom: 10px; color: #10b981; }
        p { font-size: 18px; color: #94a3b8; margin-bottom: 30px; }
        .btn-start {
            background: #10b981; color: white; text-decoration: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 600;
            font-size: 18px; transition: 0.3s; display: inline-block;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }
        .btn-start:hover { transform: translateY(-3px); background: #059669; }
        .badge {
            background: rgba(16, 185, 129, 0.1); color: #10b981;
            padding: 5px 15px; border-radius: 20px; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Acceso Seleccionado</div>
        <h1>Fruti Studio</h1>
        <p>Si estás aquí, es porque has sido seleccionado para formar parte de nuestro equipo exclusivo de creadores. Sube tus historias y llega a miles de personas.</p>
        <a href="/login.html" class="btn-start">Iniciar Sesión en el Panel</a>
    </div>
</body>
</html>
