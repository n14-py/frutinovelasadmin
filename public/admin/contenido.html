<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Moderación de Series</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { fruti: '#FF4D4D', panel: '#1f2937' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f1219; }
        ::-webkit-scrollbar-thumb { background: #FF4D4D; border-radius: 10px; }
        .glass-panel { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-[#0f1219] text-white h-screen flex overflow-hidden font-sans selection:bg-fruti selection:text-white">

    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 w-72 bg-gray-900 border-r border-gray-800 flex flex-col justify-between shadow-2xl z-50 transition-transform duration-300 ease-in-out">
        <div class="overflow-y-auto h-full">
            <div class="p-6 flex items-center justify-between border-b border-gray-800 sticky top-0 bg-gray-900 z-10">
                <div class="flex items-center space-x-3">
                    <div class="bg-fruti p-2.5 rounded-xl shadow-[0_0_20px_rgba(255,77,77,0.4)]">
                        <i class="fa-solid fa-crown text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-widest text-white leading-tight">FRUTI<span class="text-fruti">ADMIN</span></h1>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <nav class="p-4 space-y-1.5 mt-2">
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3 px-4">Panel Central</p>
                <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-chart-line w-5 text-lg"></i> <span>Dashboard General</span>
                </a>
                <a href="usuarios.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-mobile-screen-button w-5 text-lg"></i> <span>Usuarios Móviles</span>
                </a>
                <a href="creadores.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-video w-5 text-lg"></i> <span>Creadores (Socios)</span>
                </a>
                <a href="contenido.html" class="w-full flex items-center space-x-3 px-4 py-3.5 bg-fruti/10 text-fruti border-r-4 border-fruti rounded-l-xl transition-all font-bold">
                    <i class="fa-solid fa-clapperboard w-5 text-lg"></i> <span>Moderación de Series</span>
                </a>

                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3 mt-8 px-4">Administración</p>
                <a href="finanzas.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-building-columns w-5 text-lg"></i> <span>Finanzas y Pagos</span>
                </a>
                <a href="marketing.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-bullhorn w-5 text-lg"></i> <span>Marketing (Push)</span>
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="lg:hidden flex items-center justify-between p-4 bg-gray-900 border-b border-gray-800 z-20">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-crown text-fruti"></i>
                <span class="font-bold tracking-widest">FRUTINOVELAS</span>
            </div>
            <button onclick="toggleSidebar()" class="text-white text-2xl focus:outline-none"><i class="fa-solid fa-bars"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 relative z-10">
            
            <div class="flex flex-col lg:flex-row lg:justify-between lg:items-end mb-8 gap-4">
                <div>
                    <h2 class="text-2xl lg:text-3xl font-black tracking-tight">Moderación de Contenido</h2>
                    <p class="text-gray-400 mt-1 text-xs lg:text-sm">Revisa las series subidas por tus creadores antes de que sean públicas.</p>
                </div>
                
                <div class="flex space-x-2 w-full lg:w-auto">
                    <button onclick="filtrarPorEstado('todos')" class="flex-1 lg:flex-none bg-gray-800 border border-gray-700 hover:bg-gray-700 text-white px-4 py-3 rounded-xl text-sm font-bold transition shadow-inner">Mostrar Todas</button>
                    <button onclick="filtrarPorEstado('pendiente')" class="flex-1 lg:flex-none bg-yellow-900/30 text-yellow-500 border border-yellow-800/50 hover:bg-yellow-900/50 px-4 py-3 rounded-xl text-sm font-bold transition shadow-inner"><i class="fa-solid fa-clock mr-1"></i> Pendientes</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6" id="grid-series">
                <div class="col-span-full text-center py-12 text-gray-500">
                    <i class="fa-solid fa-circle-notch fa-spin fa-3x mb-4 text-fruti"></i>
                    <p class="text-sm font-medium tracking-widest uppercase">Cargando catálogo...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api/admin';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        let seriesGlobal = [];

        async function cargarSeries() {
            try {
                const res = await fetch(`${API_URL}/novelas`, { headers });
                if(!res.ok) throw new Error("Fallo API");
                seriesGlobal = await res.json();
                renderizarGrid(seriesGlobal);
            } catch (e) {
                Swal.fire({icon: 'error', title: 'Error', text: 'No se pudo conectar a la base de datos.', background: '#1f2937', color: '#fff'});
            }
        }

        function renderizarGrid(series) {
            const grid = document.getElementById('grid-series');
            if(series.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 font-bold">No hay series que coincidan.</div>`;
                return;
            }

            grid.innerHTML = series.map(s => {
                let badge = '';
                if(s.estado === 'aprobado') badge = `<span class="bg-green-500 text-white text-[10px] font-black px-2.5 py-1 rounded-md shadow uppercase tracking-wider"><i class="fa-solid fa-check mr-1"></i> Aprobada</span>`;
                else if(s.estado === 'rechazado') badge = `<span class="bg-red-500 text-white text-[10px] font-black px-2.5 py-1 rounded-md shadow uppercase tracking-wider"><i class="fa-solid fa-xmark mr-1"></i> Rechazada</span>`;
                else badge = `<span class="bg-yellow-500 text-black text-[10px] font-black px-2.5 py-1 rounded-md shadow uppercase tracking-wider animate-pulse"><i class="fa-solid fa-eye mr-1"></i> En Revisión</span>`;

                return `
                <div class="glass-panel rounded-2xl border border-gray-800 overflow-hidden flex flex-col hover:border-gray-600 transition duration-300 group shadow-lg">
                    <div class="h-56 w-full bg-gray-800 relative overflow-hidden">
                        <img src="${s.portadaUrl || 'https://via.placeholder.com/400x600?text=Sin+Portada'}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent opacity-80"></div>
                        <div class="absolute top-3 left-3 z-10">${badge}</div>
                        ${s.esDestacada ? '<div class="absolute top-3 right-3 z-10 bg-purple-600 text-white text-[10px] font-black px-2.5 py-1 rounded-md shadow uppercase tracking-wider"><i class="fa-solid fa-star mr-1"></i> Banner Main</div>' : ''}
                        
                        <div class="absolute bottom-3 left-4 right-4 z-10">
                            <h3 class="text-xl font-black text-white truncate shadow-black drop-shadow-md">${s.title || s.titulo}</h3>
                            <p class="text-[11px] text-gray-300 uppercase tracking-widest font-bold mt-1"><i class="fa-solid fa-user-tie text-fruti mr-1"></i> ${s.nombreCreador}</p>
                        </div>
                    </div>
                    
                    <div class="p-4 flex flex-col space-y-2 bg-gray-900/50">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="cambiarEstado('${s.id}', 'aprobado')" class="bg-green-900/30 text-green-400 hover:bg-green-600 hover:text-white border border-green-800/50 py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider transition shadow-sm"><i class="fa-solid fa-check mr-1"></i> Aprobar</button>
                            <button onclick="destacar('${s.id}')" class="bg-purple-900/30 text-purple-400 hover:bg-purple-600 hover:text-white border border-purple-800/50 py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider transition shadow-sm"><i class="fa-solid fa-star mr-1"></i> Destacar</button>
                        </div>
                        <button onclick="borrar('${s.id}')" class="w-full bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white border border-red-900/50 py-3 rounded-xl text-[11px] font-black uppercase tracking-wider transition shadow-sm mt-2"><i class="fa-solid fa-trash mr-1"></i> Aniquilar Serie (Borrado Cascada)</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filtrarPorEstado(estado) {
            if(estado === 'todos') renderizarGrid(seriesGlobal);
            else renderizarGrid(seriesGlobal.filter(s => s.estado === estado));
        }

        async function cambiarEstado(id, estado) {
            Swal.fire({title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff'});
            await fetch(`${API_URL}/novelas/${id}/estado`, { method: 'PUT', headers, body: JSON.stringify({estado}) });
            cargarSeries();
            Swal.close();
        }

        async function destacar(id) {
            Swal.fire({title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff'});
            await fetch(`${API_URL}/novelas/${id}/destacar`, { method: 'PUT', headers });
            Swal.fire({ icon: 'success', title: 'Banner Actualizado', background: '#1f2937', color: '#fff', timer: 1500, showConfirmButton: false });
            cargarSeries();
        }

        async function borrar(id) {
            const res = await Swal.fire({
                title: '¿ELIMINAR DEFINITIVAMENTE?',
                text: "Se borrará la serie y todos sus videos del servidor. Esto no se puede deshacer.",
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#374151',
                confirmButtonText: 'Sí, Eliminar Todo', background: '#1f2937', color: '#fff'
            });
            
            if(res.isConfirmed) {
                Swal.fire({title: 'Eliminando videos...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff'});
                try {
                    const response = await fetch(`${API_URL}/novelas/${id}`, { method: 'DELETE', headers });
                    if(response.ok) {
                        Swal.fire({ icon: 'success', title: 'Borrado Exitoso', background: '#1f2937', color: '#fff', timer: 1500, showConfirmButton: false });
                        cargarSeries(); 
                    } else throw new Error("Fallo API");
                } catch(error) {
                    Swal.fire({icon: 'error', title: 'Error al borrar', text: 'Revise la conexión a Firebase.', background: '#1f2937', color: '#fff'});
                }
            }
        }

        window.onload = cargarSeries;
    </script>
</body>
</html>
