<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Gestión de Creadores</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { fruti: '#FF4D4D', panel: '#1f2937' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f1219; }
        ::-webkit-scrollbar-thumb { background: #FF4D4D; border-radius: 10px; }
        .glass-panel { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-[#0f1219] text-white h-screen flex overflow-hidden font-sans selection:bg-fruti selection:text-white">

    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 w-72 bg-gray-900 border-r border-gray-800 flex flex-col justify-between shadow-2xl z-50 transition-transform duration-300 ease-in-out">
        <div class="overflow-y-auto h-full">
            <div class="p-6 flex items-center justify-between border-b border-gray-800 sticky top-0 bg-gray-900 z-10">
                <div class="flex items-center space-x-3">
                    <div class="bg-fruti p-2.5 rounded-xl shadow-[0_0_20px_rgba(255,77,77,0.4)]">
                        <i class="fa-solid fa-crown text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-widest text-white leading-tight">FRUTI<span class="text-fruti">ADMIN</span></h1>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <nav class="p-4 space-y-1.5 mt-2">
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3 px-4">Panel Central</p>
                <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-chart-line w-5 text-lg"></i> <span>Dashboard General</span>
                </a>
                <a href="usuarios.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-mobile-screen-button w-5 text-lg"></i> <span>Usuarios Móviles</span>
                </a>
                <a href="creadores.html" class="w-full flex items-center space-x-3 px-4 py-3.5 bg-fruti/10 text-fruti border-r-4 border-fruti rounded-l-xl transition-all font-bold">
                    <i class="fa-solid fa-video w-5 text-lg"></i> <span>Creadores (Socios)</span>
                </a>
                <a href="contenido.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-clapperboard w-5 text-lg"></i> <span>Moderación de Series</span>
                </a>

                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3 mt-8 px-4">Administración</p>
                <a href="finanzas.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-building-columns w-5 text-lg"></i> <span>Finanzas y Pagos</span>
                </a>
                <a href="marketing.html" class="w-full flex items-center space-x-3 px-4 py-3.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-bullhorn w-5 text-lg"></i> <span>Marketing (Push)</span>
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="lg:hidden flex items-center justify-between p-4 bg-gray-900 border-b border-gray-800 z-20">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-crown text-fruti"></i>
                <span class="font-bold tracking-widest">FRUTINOVELAS</span>
            </div>
            <button onclick="toggleSidebar()" class="text-white text-2xl focus:outline-none"><i class="fa-solid fa-bars"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 relative z-10">
            
            <div class="flex flex-col lg:flex-row lg:justify-between lg:items-end mb-8 gap-4">
                <div>
                    <h2 class="text-2xl lg:text-3xl font-black tracking-tight">Red de Creadores</h2>
                    <p class="text-gray-400 mt-1 text-xs lg:text-sm">Agrega nuevos socios, aplica strikes o elimínalos del sistema.</p>
                </div>
                
                <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 w-full lg:w-auto">
                    <div class="relative w-full lg:w-64">
                        <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar socio..." class="w-full bg-gray-800 border border-gray-700 text-white pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-fruti focus:ring-1 focus:ring-fruti transition-all text-sm shadow-inner">
                    </div>
                    <button onclick="agregarCreador()" class="bg-fruti hover:bg-red-600 text-white px-5 py-3 rounded-xl font-bold shadow-lg hover:shadow-red-500/30 transition transform hover:-translate-y-1 w-full sm:w-auto flex justify-center items-center whitespace-nowrap">
                        <i class="fa-solid fa-user-plus mr-2"></i> Nuevo Creador
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="grid-creadores">
                <div class="col-span-full text-center py-12 text-gray-500">
                    <i class="fa-solid fa-circle-notch fa-spin fa-3x mb-4 text-fruti"></i>
                    <p class="text-sm font-medium tracking-widest uppercase">Cargando base de creadores...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api/admin';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        let creadoresGlobal = [];

        async function cargarCreadores() {
            try {
                const res = await fetch(`${API_URL}/creadores`, { headers });
                if(!res.ok) throw new Error("Fallo API");
                creadoresGlobal = await res.json();
                renderizarGrid(creadoresGlobal);
            } catch (e) {
                Swal.fire({icon: 'error', title: 'Error Crítico', text: 'No se pudo leer la colección.', background: '#1f2937', color: '#fff'});
            }
        }

        function renderizarGrid(creadores) {
            const grid = document.getElementById('grid-creadores');
            if(creadores.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 font-bold">No se encontraron creadores registrados.</div>`;
                return;
            }

            grid.innerHTML = creadores.map(c => {
                const strikes = c.strikes || 0;
                let strikeHtml = '';
                for(let i=0; i<3; i++) {
                    strikeHtml += `<i class="fa-solid fa-triangle-exclamation mx-1 text-base lg:text-lg ${i < strikes ? 'text-orange-500 drop-shadow-md' : 'text-gray-700'}"></i>`;
                }
                
                const estadoHtml = c.estado === 'activo' 
                    ? `<span class="text-green-400 font-black text-[10px] bg-green-900/30 px-3 py-1.5 rounded-lg border border-green-800/50 uppercase tracking-widest shadow-sm"><i class="fa-solid fa-check mr-1"></i> Cuenta Activa</span>`
                    : `<span class="text-red-500 font-black text-[10px] bg-red-900/30 px-3 py-1.5 rounded-lg border border-red-800/50 uppercase tracking-widest shadow-sm"><i class="fa-solid fa-ban mr-1"></i> Suspendido</span>`;

                return `
                <div class="glass-panel rounded-2xl border border-gray-800 p-5 lg:p-6 flex flex-col relative overflow-hidden group hover:border-gray-600 transition-colors shadow-xl">
                    ${c.estado !== 'activo' ? '<div class="absolute inset-0 bg-red-900/5 pointer-events-none"></div>' : ''}
                    
                    <div class="flex items-start space-x-4 mb-6 relative z-10">
                        <img src="https://ui-avatars.com/api/?name=${c.nombre}&background=2D0A0A&color=FF4D4D&size=128&bold=true" class="w-16 h-16 rounded-xl border border-gray-700 shadow-lg group-hover:scale-105 transition-transform">
                        <div class="flex-1 overflow-hidden">
                            <h3 class="font-black text-lg text-white truncate leading-tight mb-1">${c.nombre}</h3>
                            <p class="text-xs text-gray-400 truncate mb-3">${c.correo}</p>
                            ${estadoHtml}
                        </div>
                    </div>

                    <div class="bg-gray-900/80 rounded-xl p-4 border border-gray-800 mb-6 flex justify-between items-center relative z-10 shadow-inner">
                        <div>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1.5">Infracciones (Strikes)</p>
                            <div class="flex">${strikeHtml}</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-auto relative z-10">
                        <button onclick="darStrike('${c.id}')" class="bg-orange-900/20 text-orange-400 border border-orange-900/50 hover:bg-orange-600 hover:text-white px-2 py-3 rounded-xl text-xs font-bold transition shadow-md flex justify-center items-center">
                            <i class="fa-solid fa-triangle-exclamation mr-1.5"></i> Dar Strike
                        </button>
                        <button onclick="cambiarEstado('${c.id}', '${c.estado === 'activo' ? 'baneado' : 'activo'}')" class="${c.estado === 'activo' ? 'bg-red-900/20 text-red-500 border-red-900/50 hover:bg-red-600' : 'bg-green-900/20 text-green-500 border-green-900/50 hover:bg-green-600'} hover:text-white border px-2 py-3 rounded-xl text-xs font-bold transition shadow-md flex justify-center items-center">
                            <i class="fa-solid fa-power-off mr-1.5"></i> ${c.estado === 'activo' ? 'Suspender' : 'Activar'}
                        </button>
                        <button onclick="eliminarCreador('${c.id}', '${c.nombre}')" class="col-span-2 bg-gray-800 text-gray-400 border border-gray-700 hover:bg-red-700 hover:text-white hover:border-red-600 px-4 py-3 rounded-xl text-xs font-bold transition shadow-md flex justify-center items-center mt-1">
                            <i class="fa-solid fa-trash-can mr-1.5"></i> Eliminar Definitivamente
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function filtrarTabla() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            renderizarGrid(creadoresGlobal.filter(c => c.nombre.toLowerCase().includes(txt) || c.correo.toLowerCase().includes(txt)));
        }

        // 🔥 FUNCIÓN 1: AGREGAR NUEVO CREADOR
        async function agregarCreador() {
            const { value: formValues } = await Swal.fire({
                title: 'Registrar Nuevo Socio',
                html: `
                    <div class="text-left space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nombre del Creador o Estudio</label>
                            <input id="swal-nombre" class="w-full mt-1 bg-gray-800 text-white border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-fruti" placeholder="Ej: Juan Perez">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Correo Electrónico</label>
                            <input id="swal-correo" type="email" class="w-full mt-1 bg-gray-800 text-white border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-fruti" placeholder="correo@estudio.com">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Contraseña de Acceso</label>
                            <input id="swal-password" type="password" class="w-full mt-1 bg-gray-800 text-white border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-fruti" placeholder="••••••••">
                        </div>
                    </div>
                `,
                background: '#1f2937', color: '#fff', showCancelButton: true, confirmButtonColor: '#FF4D4D', cancelButtonColor: '#374151', confirmButtonText: 'Crear Cuenta',
                preConfirm: () => {
                    const nombre = document.getElementById('swal-nombre').value.trim();
                    const correo = document.getElementById('swal-correo').value.trim();
                    const password = document.getElementById('swal-password').value.trim();
                    if(!nombre || !correo || !password) { Swal.showValidationMessage('Todos los campos son obligatorios'); return false; }
                    return { nombre, correo, password };
                }
            });

            if (formValues) {
                Swal.fire({ title: 'Creando cuenta...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff' });
                try {
                    const res = await fetch(`${API_URL}/creadores`, { method: 'POST', headers, body: JSON.stringify(formValues) });
                    const data = await res.json();
                    if(res.ok) {
                        Swal.fire({ icon: 'success', title: 'Creador Registrado', text: 'El socio ya puede iniciar sesión en el Studio.', background: '#1f2937', color: '#fff' });
                        cargarCreadores();
                    } else {
                        throw new Error(data.error || 'Error al crear');
                    }
                } catch(error) {
                    Swal.fire({icon: 'error', title: 'Error', text: error.message, background: '#1f2937', color: '#fff'});
                }
            }
        }

        // 🔥 FUNCIÓN 2: ELIMINAR CREADOR
        async function eliminarCreador(id, nombre) {
            const res = await Swal.fire({
                title: `¿Eliminar a ${nombre}?`,
                text: "Se borrará su cuenta del sistema. Esto no borrará sus series (ve a Moderación de Series para borrarlas si es necesario).",
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#374151',
                confirmButtonText: 'Sí, Eliminar Perfil', background: '#1f2937', color: '#fff'
            });

            if(res.isConfirmed) {
                Swal.fire({title: 'Eliminando...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff'});
                try {
                    const req = await fetch(`${API_URL}/creadores/${id}`, { method: 'DELETE', headers });
                    if(req.ok) {
                        Swal.fire({ icon: 'success', title: 'Perfil Eliminado', background: '#1f2937', color: '#fff', timer: 1500, showConfirmButton: false });
                        cargarCreadores();
                    } else throw new Error("No se pudo eliminar");
                } catch(e) {
                    Swal.fire({icon: 'error', title: 'Error', text: 'Fallo al eliminar el perfil.', background: '#1f2937', color: '#fff'});
                }
            }
        }

        function darStrike(id) {
            Swal.fire({title: 'Info', text: 'Esta función pronto enviará un correo automático de advertencia al creador.', icon: 'info', background: '#1f2937', color: '#fff'});
        }

        async function cambiarEstado(id, nuevoEstado) {
            const accion = nuevoEstado === 'baneado' ? 'Suspender' : 'Reactivar';
            const res = await Swal.fire({
                title: `¿${accion} Cuenta?`, text: `El creador ${nuevoEstado === 'baneado' ? 'perderá' : 'recuperará'} acceso a su Studio.`,
                icon: 'warning', showCancelButton: true, confirmButtonColor: nuevoEstado === 'baneado' ? '#d33' : '#10b981', confirmButtonText: `Sí, ${accion}`, background: '#1f2937', color: '#fff'
            });

            if(res.isConfirmed) {
                Swal.fire({title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1f2937', color: '#fff'});
                await fetch(`${API_URL}/creadores/${id}/contrato`, { method: 'PUT', headers, body: JSON.stringify({ estado: nuevoEstado }) });
                cargarCreadores();
                Swal.close();
            }
        }

        window.onload = cargarCreadores;
    </script>
</body>
</html>
