<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Configuración - Frutinovelas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .profile-header {
            text-align: center;
            padding: 30px 0;
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }
        .profile-img {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        .menu-list {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #333;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item i { color: var(--primary); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Ajustes</h1>
        </header>

        <div class="profile-header">
            <div class="profile-img">
                <i class="material-icons" style="font-size: 40px; color: white;">person</i>
            </div>
            <h2 id="user-email" style="font-size: 18px; margin: 0;">Cargando...</h2>
            <p style="color: var(--grey); font-size: 12px; margin-top: 5px;">ID de Creador Verificado</p>
        </div>

        <div class="menu-list">
            <div class="menu-item">
                <i class="material-icons">account_circle</i>
                <div style="flex: 1;">Editar Perfil</div>
                <i class="material-icons" style="color: #333;">chevron_right</i>
            </div>
            <div class="menu-item">
                <i class="material-icons">payments</i>
                <div style="flex: 1;">Métodos de Pago</div>
                <i class="material-icons" style="color: #333;">chevron_right</i>
            </div>
            <div class="menu-item">
                <i class="material-icons">help</i>
                <div style="flex: 1;">Centro de Soporte</div>
                <i class="material-icons" style="color: #333;">chevron_right</i>
            </div>
            <div class="menu-item" id="btn-logout" style="cursor: pointer;">
                <i class="material-icons" style="color: #ff4d4d;">logout</i>
                <div style="flex: 1; color: #ff4d4d; font-weight: bold;">Cerrar Sesión</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="material-icons">dashboard</i>
            <span>Inicio</span>
        </a>
        <a href="mis-series.html" class="nav-item">
            <i class="material-icons">video_library</i>
            <span>Mis Series</span>
        </a>
        <a href="config.html" class="nav-item active">
            <i class="material-icons">settings</i>
            <span>Ajustes</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { projectId: "frutinovelas-b564c" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email;
            } else {
                window.location.href = "../login.html";
            }
        });

        document.getElementById('btn-logout').onclick = async () => {
            if(confirm("¿Quieres salir del panel?")) {
                await signOut(auth);
                window.location.href = "../login.html";
            }
        };
    </script>
</body>
</html>
